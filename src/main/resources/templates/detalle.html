<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Individuo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <h1>Detalle Individuo</h1>
    <div class="detalle-card">
    <p><b>Nombre:</b><span th:text="${individuo.nombre}"></span></p>
    <p><b>Apellido:</b><span th:text="${individuo.apellido}"></span></p>
    <p><b>Edad:</b><span th:text="${individuo.edad}"></span></p>
    <p><b>Correo:</b><span th:text="${individuo.correo}"></span></p>
    <p><b>Telefono:</b><span th:text="${individuo.telefono}"></span></p>
    </div>
    <hr>

    <div style="text-align:center; margin-top: 16px;">
        <a th:href="@{/}" class="btn btn-secondary">Volver</a>
    </div>


</body>
</html>
